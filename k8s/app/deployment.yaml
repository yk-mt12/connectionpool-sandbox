apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
  namespace: connectionpool-sandbox
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app
  template:
    metadata:
      labels:
        app: app
    spec:
      containers:
        - name: app
          image: connectionpool-sandbox-app:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: MYSQL_DSN
              value: "root:root@tcp(mysql:3306)/sandbox?parseTime=true"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
