apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: connectionpool-grafana
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    # Helm chart from grafana
    - repoURL: https://grafana.github.io/helm-charts
      chart: grafana
      targetRevision: "*"
      helm:
        releaseName: grafana
        valueFiles:
          - $values/k8s/helm-values/grafana.yaml
    # Local values file reference
    - repoURL: https://github.com/yk-mt12/connectionpool-sandbox.git
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: connectionpool-sandbox
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
