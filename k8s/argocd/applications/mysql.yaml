apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: connectionpool-mysql
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/yk-mt12/connectionpool-sandbox.git
    targetRevision: HEAD
    path: k8s/mysql
  destination:
    server: https://kubernetes.default.svc
    namespace: connectionpool-sandbox
  syncPolicy:
    automated:
      # prune disabled: prevent accidental PVC deletion on git changes
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
