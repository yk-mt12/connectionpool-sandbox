apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: connectionpool-root
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/yk-mt12/connectionpool-sandbox.git
    targetRevision: HEAD
    path: k8s/argocd/applications
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
