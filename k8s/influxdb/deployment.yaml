apiVersion: apps/v1
kind: Deployment
metadata:
  name: influxdb
  namespace: connectionpool-sandbox
spec:
  replicas: 1
  selector:
    matchLabels:
      app: influxdb
  template:
    metadata:
      labels:
        app: influxdb
    spec:
      containers:
        - name: influxdb
          image: influxdb:1.8
          ports:
            - containerPort: 8086
          env:
            - name: INFLUXDB_DB
              value: k6
            - name: INFLUXDB_HTTP_AUTH_ENABLED
              value: "false"
          volumeMounts:
            - name: storage
              mountPath: /var/lib/influxdb
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: influxdb-pvc
