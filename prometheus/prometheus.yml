global:
  scrape_interval: 10s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: mysql
    static_configs:
      - targets: ['mysql-exporter:9104']

  - job_name: app
    static_configs:
      - targets: ['app:8080']
    metrics_path: /metrics
